  <title>Portfolio — TEI Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500&family=Pinyon+Script&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css">

<body>

  <div class="page-shell">

    <!-- NAV -->
    <nav class="site-nav">
      <a href="../" class="site-nav__brand">
        <span class="site-nav__logo-img">te.istudio</span>
      </a>
      <ul class="site-nav__links">
        <li><a href="../">Home</a></li>
        <li><a href="../about/">About</a></li>
        <li><a href="../portfolio/" class="is-active">Portfolio</a></li>
        <li><a href="../services/">Services</a></li>
        <li><a href="../contact/">Contact</a></li>
      </ul>
    </nav>

    <!-- PAGE HERO -->
    <header class="page-hero">
      <span class="page-hero__eyebrow">Our Work</span>
      <h1 class="page-hero__title" data-edit-key="hero-title">Portfolio</h1>
      <p class="page-hero__sub" data-edit-key="hero-sub">A selection of residential and commercial interiors, each designed with care and intention.</p>
    </header>

    <!-- PORTFOLIO CONTENT -->
    <main class="page-content">

      <!-- Filter bar -->
      <div class="filter-bar">
        <button class="filter-btn is-active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="residential">Residential</button>
        <button class="filter-btn" data-filter="commercial">Commercial</button>
        <button class="filter-btn" data-filter="hospitality">Hospitality</button>
      </div>

      <!-- Project grid — cards are added via the editor -->
      <div class="portfolio-grid" id="project-grid"></div>

    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <span class="site-footer__copy">© 2024 TEI Studio. All rights reserved.</span>
      <nav class="site-footer__links">
        <a href="../">Home</a>
        <a href="../about/">About</a>
        <a href="../services/">Services</a>
        <a href="../contact/">Contact</a>
      </nav>
    </footer>

  </div>
